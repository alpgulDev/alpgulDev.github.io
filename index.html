<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alpgulDev - Projects</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --text-primary: #f5f5f5;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #2a2a2a;
            --card-hover: #1f1f1f;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-primary: #fafafa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f0f0f0;
            --text-primary: #111111;
            --text-secondary: #555555;
            --text-muted: #888888;
            --accent: #4f46e5;
            --accent-hover: #6366f1;
            --border: #e5e5e5;
            --card-hover: #f5f5f5;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
        }

        .theme-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            color: var(--text-secondary);
        }

        .theme-btn.active {
            background: var(--accent);
            color: white;
        }

        .hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }

        .hero p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
        }

        .project-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: block;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-4px);
            background: var(--card-hover);
            border-color: var(--accent);
            box-shadow: 0 12px 40px var(--shadow);
        }

        .project-card:hover::before {
            transform: scaleX(1);
        }

        .project-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .project-status {
            font-size: 1.5rem;
        }

        .project-icon img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .project-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .project-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .project-date {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .project-links {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .project-link {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            padding: 0.4rem 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .project-link:hover {
            background: var(--accent);
            color: white;
        }

        .project-link img {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .container {
                padding: 1.5rem 1rem;
            }

            .hero h1 {
                font-size: 1.75rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .theme-toggle {
                position: absolute;
                top: 1.5rem;
                right: 1.5rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">AD</div>
                <span class="logo-text">alpgulDev</span>
            </div>
            <div class="theme-toggle">
                <button class="theme-btn active" id="darkBtn" aria-label="Dark theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button class="theme-btn" id="lightBtn" aria-label="Light theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
            </div>
        </header>

        <section class="hero">
            <h1>List</h1>
            <p>My HuggingFace Spaces</p>
        </section>

        <div class="projects-grid">
            <a href="OmniRoute/" class="project-card">
                <div class="project-header">
                    <div class="project-icon"><img src="https://icons.duckduckgo.com/ip2/alpgul-omniroute.hf.space.ico" alt=""></div>
                </div>
                <h3 class="project-name">OmniRoute</h3>
                <div class="project-links">
                    <a href="https://github.com/diegosouzapw/OmniRoute" target="_blank" class="project-link">
                        <img src="https://icons.duckduckgo.com/ip2/github.com.ico" alt="">
                        GitHub
                    </a>
                </div>
            </a>

            <a href="MCP%20Context%20Forge/" class="project-card">
                <div class="project-header">
                    <div class="project-icon"><img src="https://icons.duckduckgo.com/ip2/alpgul-mcp-context-forge.hf.space.ico" alt=""></div>
                </div>
                <h3 class="project-name">MCP Context Forge</h3>
                <div class="project-links">
                    <a href="https://github.com/IBM/mcp-context-forge" target="_blank" class="project-link">
                        <img src="https://icons.duckduckgo.com/ip2/github.com.ico" alt="">
                        GitHub
                    </a>
                </div>
            </a>

            <a href="MCPHub/" class="project-card">
                <div class="project-header">
                    <div class="project-icon"><img src="https://icons.duckduckgo.com/ip2/alpgul-mcphub.hf.space.ico" alt=""></div>
                </div>
                <h3 class="project-name">MCPHub</h3>
                <div class="project-links">
                    <a href="https://github.com/samanhappy/mcphub" target="_blank" class="project-link">
                        <img src="https://icons.duckduckgo.com/ip2/github.com.ico" alt="">
                        GitHub
                    </a>
                </div>
            </a>

            <a href="Litellm/" class="project-card">
                <div class="project-header">
                    <div class="project-icon"><img src="https://icons.duckduckgo.com/ip2/alpgul-litellm.hf.space.ico" alt=""></div>
                </div>
                <h3 class="project-name">Litellm</h3>
                <div class="project-links">
                    <a href="https://github.com/BerriAI/litellm" target="_blank" class="project-link">
                        <img src="https://icons.duckduckgo.com/ip2/github.com.ico" alt="">
                        GitHub
                    </a>
                </div>
            </a>

            <a href="OpenWebUI/" class="project-card">
                <div class="project-header">
                    <div class="project-icon"><img src="https://icons.duckduckgo.com/ip2/alpgul-openwebui.hf.space.ico" alt=""></div>
                </div>
                <h3 class="project-name">OpenWebUI</h3>
                <div class="project-links">
                    <a href="https://github.com/open-webui/open-webui" target="_blank" class="project-link">
                        <img src="https://icons.duckduckgo.com/ip2/github.com.ico" alt="">
                        GitHub
                    </a>
                </div>
            </a>
        </div>

        <footer>
            <p>&copy; 2026 <a href="#">alpgulDev</a> &bull; All rights reserved</p>
        </footer>
    </div>

    <script>
        const darkBtn = document.getElementById('darkBtn');
        const lightBtn = document.getElementById('lightBtn');
        const html = document.documentElement;

        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        updateThemeButtons(savedTheme);

        darkBtn.addEventListener('click', () => {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            updateThemeButtons('dark');
        });

        lightBtn.addEventListener('click', () => {
            html.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
            updateThemeButtons('light');
        });

        function updateThemeButtons(theme) {
            if (theme === 'dark') {
                darkBtn.classList.add('active');
                lightBtn.classList.remove('active');
            } else {
                lightBtn.classList.add('active');
                darkBtn.classList.remove('active');
            }
        }

        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches && !localStorage.getItem('theme')) {
            html.setAttribute('data-theme', 'light');
            updateThemeButtons('light');
        }
    </script>
</body>
</html>
