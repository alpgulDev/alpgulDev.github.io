<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>alpgulDev - Projects</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg-primary: #0a0a0b;
        --bg-secondary: #18181b;
        --bg-tertiary: #27272a;

        --text-primary: #fafafa;
        --text-secondary: #a1a1aa;
        --text-muted: #71717a;

        --accent: #8b5cf6;
        --accent-hover: #a78bfa;

        --border: #27272a;

        --shadow: rgba(0, 0, 0, 0.35);
      }

      [data-theme="light"] {
        --bg-primary: #fafafa;
        --bg-secondary: #ffffff;
        --bg-tertiary: #f4f4f5;

        --text-primary: #18181b;
        --text-secondary: #52525b;
        --text-muted: #a1a1aa;

        --accent: #7c3aed;
        --accent-hover: #8b5cf6;

        --border: #e4e4e7;

        --shadow: rgba(0, 0, 0, 0.08);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        line-height: 1.5;
      }

      .container {
        max-width: 1100px;
        margin: auto;
        padding: 3rem 1.5rem;
      }

      /* HEADER */

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3rem;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.7rem;
      }

      .logo-icon {
        width: 42px;
        height: 42px;
        background: var(--accent);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: white;
      }

      .logo-text {
        font-size: 1.6rem;
        font-weight: 700;
      }

      .theme-toggle {
        display: flex;
        gap: 0.5rem;
      }

      .theme-btn {
        width: 38px;
        height: 38px;
        border: 1px solid var(--border);
        background: var(--bg-secondary);
        border-radius: 10px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
        transition: 0.2s;
      }

      .theme-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .theme-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      /* HERO */

      .hero {
        text-align: center;
        margin-bottom: 3rem;
      }

      .hero h1 {
        font-size: 2.6rem;
        margin-bottom: 0.3rem;
        letter-spacing: -0.02em;
      }

      .hero p {
        color: var(--text-secondary);
      }

      /* GRID */

      .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 1.3rem;
      }

      /* CARD */

      .project-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1.4rem;

        display: flex;
        flex-direction: column;

        transition: 0.25s;
      }

      .project-card:hover {
        transform: translateY(-3px);
        border-color: var(--accent);
        box-shadow: 0 15px 30px var(--shadow);
      }

      .project-header {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        margin-bottom: 1rem;
      }

      .project-icon {
        width: 46px;
        height: 46px;
        border-radius: 10px;
        background: var(--bg-tertiary);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .project-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .project-name {
        font-weight: 600;
        font-size: 1.05rem;
      }

      /* LINKS */

      .project-links {
        margin-top: auto;
        display: flex;
        gap: 0.4rem;
      }

      .project-link {
        display: flex;
        align-items: center;
        gap: 0.35rem;

        font-size: 0.82rem;
        padding: 0.4rem 0.7rem;

        border-radius: 7px;

        background: var(--bg-tertiary);
        color: var(--text-secondary);
        text-decoration: none;

        transition: 0.2s;
      }

      .project-link:hover {
        background: var(--accent);
        color: white;
      }

      .project-link img {
        width: 14px;
        height: 14px;
      }

      /* FOOTER */

      footer {
        margin-top: 4rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      /* MOBILE */

      @media (max-width: 640px) {
        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 1rem;
        }

        .hero h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="logo">
          <div class="logo-icon">AD</div>
          <div class="logo-text">alpgulDev</div>
        </div>

        <div class="theme-toggle">
          <button class="theme-btn active" id="darkBtn">🌙</button>
          <button class="theme-btn" id="lightBtn">☀️</button>
        </div>
      </header>

      <section class="hero">
        <h1>Projects</h1>
        <p>My HuggingFace Spaces</p>
      </section>

      <div class="projects-grid">
        <div class="project-card">
          <div class="project-header">
            <div class="project-icon">
              <img
                src="https://icons.duckduckgo.com/ip3/alpgul-omniroute.hf.space.ico"
              />
            </div>
            <div class="project-name">OmniRoute</div>
          </div>

          <div class="project-links">
            <a
              class="project-link"
              target="_blank"
              href="https://github.com/diegosouzapw/OmniRoute"
            >
              <img
                src="https://icons.duckduckgo.com/ip3/github.com.ico"
              />Github
            </a>
          </div>
        </div>
      </div>

      <footer>© 2026 alpgulDev</footer>
    </div>

    <script>
      const darkBtn = document.getElementById("darkBtn");
      const lightBtn = document.getElementById("lightBtn");
      const html = document.documentElement;

      const saved = localStorage.getItem("theme") || "dark";

      html.setAttribute("data-theme", saved);

      update(saved);

      darkBtn.onclick = () => setTheme("dark");
      lightBtn.onclick = () => setTheme("light");

      function setTheme(t) {
        html.setAttribute("data-theme", t);
        localStorage.setItem("theme", t);
        update(t);
      }

      function update(t) {
        darkBtn.classList.toggle("active", t === "dark");
        lightBtn.classList.toggle("active", t === "light");
      }
    </script>
  </body>
</html>
